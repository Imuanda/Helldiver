services:
  - type: web
    name: red-rising
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true   # Render auto-generates a secure random value
      - key: PYTHON_VERSION
        value: 3.8.3
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1             # 1 GB persistent disk — keeps SQLite across restarts
